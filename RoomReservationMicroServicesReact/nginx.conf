server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # Add headers to prevent caching of index.html itself
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Static assets should return 404 if not found, not index.html
    location /assets/ {
        # Vite generated assets are fingerprinted and immutable
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
}